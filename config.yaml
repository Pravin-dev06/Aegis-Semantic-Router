# AMD AI Router Configuration
# All configurable values live here. Secrets belong in .env.

local_provider:
  base_url: "http://localhost:1234/v1"
  model: "models/qwen2.5-3b-instruct-q4_k_m.gguf"
  timeout: 30

remote_provider:
  base_url: "https://api.fireworks.ai/inference/v1"
  model: "gemma-4-31b"
  timeout: 60

routing:
  threshold: 0.5           # Global fallback threshold
  max_remote_tokens: 4096
  fallback_enabled: true
  strategy: heuristic        # Options: heuristic | semantic | gatekeeper (stub)

  # Per-category thresholds for the heuristic scorer.
  # Score range is 0.0 to 1.0 based on length, code, math, and reasoning signals.
  # Threshold <= 0.10 forces the category to Remote (since math/code signals add 0.30/0.40).
  # Threshold >= 0.55 keeps the category Local unless the prompt is extremely long or complex.
  category_thresholds:
    mathematics: 0.10        # Force mathematics to Remote (high accuracy)
    programming: 0.10        # Force programming/code to Remote (high accuracy)
    logical_reasoning: 0.10  # Force logical reasoning to Remote (high accuracy)
    summarization: 0.55      # Keep summarisation Local (cost-effective)
    classification: 0.55     # Keep classification/sentiment Local (cost-effective)
    ner: 0.55                # Keep NER Local (cost-effective)
    general: 0.40            # Midpoint for general queries
